name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.9'
  APP_VERSION: ${{ github.ref_name }}

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename artifact
        run: cp build/app/outputs/flutter-apk/app-release.apk "Sage-${{ github.ref_name }}-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Sage-${{ github.ref_name }}-android.apk

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          $out = "Sage-${{ github.ref_name }}-windows-x64"
          New-Item -ItemType Directory -Force -Path $out
          Copy-Item -Recurse build/windows/x64/runner/Release/* $out
          Compress-Archive -Path $out -DestinationPath "$out.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: Sage-${{ github.ref_name }}-windows-x64.zip

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          VERSION="${{ github.ref_name }}"
          OUT="Sage-${VERSION}-linux-x64"
          mkdir -p "$OUT"
          cp -r build/linux/x64/release/bundle/* "$OUT/"
          tar -czf "${OUT}.tar.gz" "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: Sage-${{ github.ref_name }}-linux-x64.tar.gz

  build-macos:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package ZIP
        run: |
          VERSION="${{ github.ref_name }}"
          OUT="Sage-${VERSION}-macos-arm64"
          mkdir -p "$OUT"
          cp -R "build/macos/Build/Products/Release/Sage.app" "$OUT/"
          (cd "$OUT" && zip -r "../${OUT}.zip" Sage.app)

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: Sage-${{ github.ref_name }}-macos-arm64.zip

  release:
    name: Create GitHub Release
    needs: [build-android, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Sage ${{ github.ref_name }}
          body_path: release_notes/${{ github.ref_name }}.md
          draft: false
          prerelease: false
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: false
