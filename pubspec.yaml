name: ledger_app
description: "Sage (智账) — local-first personal ledger app built with Flutter."
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: ^3.11.5

dependencies:
  archive: ^3.6.1
  cupertino_icons: ^1.0.9
  excel: ^4.0.6
  fast_gbk: ^1.0.0
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_slidable: ^4.0.3
  pdfrx: ^1.3.5
  shared_preferences: ^2.5.5
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: docs/assets/app_icon/icon.png
  adaptive_icon_background: '#F7F5F0'
  adaptive_icon_foreground: docs/assets/app_icon/icon_foreground.png
  web:
    generate: true
    image_path: docs/assets/app_icon/icon.png
    background_color: '#F7F5F0'
    theme_color: '#2F8F83'
  windows:
    generate: true
    image_path: docs/assets/app_icon/icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: docs/assets/app_icon/icon.png

flutter:
  uses-material-design: true
